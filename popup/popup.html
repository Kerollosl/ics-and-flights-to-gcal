<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ICS to Google Calendar</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <img src="../5CoKQqq01.svg" alt="Logo">
      <h1>ICS to Google Calendar</h1>
      <p class="tagline">Instantly add events — no sign-in required</p>
    </header>

    <!-- Upload area -->
    <div id="drop-zone" class="drop-zone">
      <div class="drop-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </div>
      <p>Drop <strong>.ics</strong> file(s) here<br><span>or click to browse</span></p>
      <input type="file" id="fileInput" accept=".ics" multiple hidden>
    </div>

    <!-- Event preview (hidden until file loaded) -->
    <div id="event-preview" class="event-preview" style="display:none;">
      <div id="event-list"></div>
    </div>

    <!-- Status message -->
    <div id="status" class="status" style="display:none;"></div>

    <footer>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      <p>Your files stay on your device — nothing is uploaded</p>
    </footer>
  </div>

  <script src="ical.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
